<div class="page">
  <div class="fiche-contact">

    <div class="fiche-header">
      <div class="avatar">
        {{ contact.prenom[0] }}{{ contact.nom[0] }}
      </div>
      <div class="fiche-identite">
        <h1>{{ contact.prenom }} {{ contact.nom }}</h1>
      </div>
    </div>

    <div class="fiche-body">
      <div class="info-ligne">
        <span class="label">Âge</span>
        <span class="valeur">{{ contact.age }} ans</span>
      </div>

      <div class="info-ligne">
        <span class="label">Profession</span>
        <span class="valeur">{{ contact.profession }}</span>
      </div>

      <h2 class="section-titre">Adresse</h2>

      <div class="info-ligne">
        <span class="label">Rue</span>
        <span class="valeur">{{ contact.adresse.rue }}</span>
      </div>

      <div class="info-ligne">
        <span class="label">Code postal</span>
        <span class="valeur">{{ contact.adresse.codePostal }}</span>
      </div>

      <div class="info-ligne">
        <span class="label">Ville</span>
        <span class="valeur">{{ contact.adresse.ville }}</span>
      </div>
    </div>

  </div>
</div>
